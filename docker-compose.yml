services:
  bot:
    build: .
    container_name: ai_telegram_agent
    restart: always
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bot-network

  db:
    image: postgres:15-alpine
    container_name: ai_agent_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-AGENTEIA}
      POSTGRES_USER: ${DB_USER:-agente}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agente} -d ${DB_NAME:-AGENTEIA}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge

volumes:
  postgres_data:
